<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1024px;
      height: 1024px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D0D0D;
      overflow: hidden;
    }
    .icon-container {
      display: flex;
      align-items: baseline;
      gap: 0;
      border-radius: 180px;
      padding: 40px 60px;
      background: radial-gradient(circle at 50% 50%, rgba(92, 10, 30, 0.15) 0%, transparent 70%);
    }
    .win {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 260px;
      color: #E8DCC8;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .i-letter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-style: italic;
      font-size: 300px;
      color: #5C0A1E;
      line-height: 1;
      margin-left: -0.03em;
      position: relative;
      top: 0.04em;
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <span class="win">WIN</span><span class="i-letter">i</span>
  </div>
</body>
</html>
